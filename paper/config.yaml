project:
  name: "woven-imprint-paper"
  mode: "full-auto"

research:
  topic: >-
    Woven Imprint: Persistent Character Infrastructure for LLM-Based Agents.
    We present a modular, LLM-agnostic engine for creating AI characters that
    persist across time. The system provides: (1) Three-tier episodic memory
    (buffer/core/bedrock) with multi-strategy retrieval via Reciprocal Rank
    Fusion across semantic, keyword, recency, importance, and relationship
    dimensions; (2) Four-level persona constraints (hard/temporal/soft/emergent)
    with NLI-inspired consistency checking and post-generation enforcement;
    (3) Five-dimensional relationship tracking (trust, affection, respect,
    familiarity, tension) with bounded per-interaction updates and trajectory
    detection; (4) Belief revision with certainty scores, allowing characters
    to genuinely change their mind while remembering what they used to believe;
    (5) Emotional state tracking (15 moods, natural decay) and narrative arc
    awareness (story beats, tension curves). Evaluated with 13 synthetic
    benchmarks (93% avg score) and a 16-scene Pride and Prejudice simulation
    tracking Elizabeth-Darcy relationship evolution from hostility to love.
    The system is local-first (SQLite), supports Ollama/OpenAI/Anthropic,
    and fills a gap no existing tool addresses: persistent memory + character
    persona + relationship tracking + consistency checking in one package.
    Compared against Character.AI, Inworld, Convai, Replika, Letta (MemGPT),
    Mem0, and Zep.
  domains:
    - "conversational-ai"
    - "memory-augmented-llm"
    - "character-ai"
    - "npc-dialogue"
  daily_paper_count: 10
  quality_threshold: 3.5

runtime:
  timezone: "Europe/Helsinki"
  max_parallel_tasks: 2
  approval_timeout_hours: 24
  retry_limit: 2

llm:
  provider: "openai-compatible"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
  api_key_env: "GEMINI_API_KEY"
  primary_model: "gemini-2.5-flash"
  fallback_models:
    - "gemini-2.0-flash"

security:
  hitl_required_stages: []
  allow_publish_without_approval: true
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 3
  metric_key: "benchmark_score"
  metric_direction: "maximize"

export:
  target_conference: "neurips_2025"
  authors: "Toni Mikkola"
  bib_file: "references"

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

notifications:
  channel: "console"
  target: ""

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false
